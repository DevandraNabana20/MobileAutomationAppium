name: Appium Android Test

on:
  push:
    branches:
      - main

env:
  JAVA_VERSION: "25"
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2

jobs:
  test:
    name: Run Appium Tests
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Check Emulator Running
        shell: powershell
        run: |
          $output = & adb devices 2>&1 | Out-String
          Write-Host "ADB output: $output"
          if ($output -notmatch "emulator") {
            Write-Error "Emulator tidak ditemukan! Jalankan emulator dulu."
            exit 1
          }
          Write-Host "Emulator aktif"

      - name: Check Appium Server Running
        shell: powershell
        run: |
          try {
            $response = Invoke-RestMethod -Uri "http://127.0.0.1:4723/status" -Method Get
            Write-Host "Appium server aktif"
          } catch {
            Write-Error "Appium server tidak berjalan! Jalankan dulu: appium --address 127.0.0.1 --port 4723"
            exit 1
          }

      - name: Run all tests
        shell: cmd
        run: gradlew.bat clean test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7